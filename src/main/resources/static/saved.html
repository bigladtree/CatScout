<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="home.css">
    <title>CatScout - Saved</title>
  </head>
  <body>
    <div class="page">
      <!-- Header -->
      <header class="header">
        <h1 class="logo">CatScout</h1>
        <p class="tagline">looking for your fur-ever friend? you've come to the right place.</p>
      </header>

      <div class="content-wrapper">
        <!-- Sidebar -->
        <nav class="sidebar">
          <a href="index.html" class="nav-link">Home</a>
          <a href="explore.html" class="nav-link">Explore</a>
          <a href="newowners.html" class="nav-link">New Owners</a>
          <a href="saved.html" class="nav-link active">Saved</a>
          <a href="settings.html" class="nav-link">Settings</a>
          <a href="credits.html" class="nav-link">Credits</a>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
          <h2 class="welcome">Saved</h2>

          <p>
            This is where the kitties you save for later go. All their info will be here.
          </p>

          <!-- saved cat cards grid -->
          <div id="savedGrid" class="cat-grid">
          </div>

        <script>
          //dark mode check
          if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark');

          //removes cats from saved.
          function removeCat(index) {
            var saved = JSON.parse(localStorage.getItem('savedCats') || '[]');
            saved.splice(index, 1);
            localStorage.setItem('savedCats', JSON.stringify(saved));
            renderSaved();
          }

          //puts em on screen!!
          function renderSaved() {
            var grid = document.getElementById('savedGrid');
            var cats = JSON.parse(localStorage.getItem('savedCats') || '[]');

            if (cats.length === 0) {
              grid.innerHTML = '<p>No saved cats yet.</p>';
              return;
            }

            var html = '';
            //loops through saved cats and creates their cards
            for (var i = 0; i < cats.length; i++) {
              var cat = cats[i];
              html += '<div class="cat-card">';
              html += cat.photoUrl
                ? '<div class="cat-card-img-wrapper"><img class="cat-card-img" src="' + cat.photoUrl + '" alt="' + cat.name + '"></div>'
                : '<div class="cat-card-img-placeholder">No Photo</div>';
              html += '<div class="cat-card-info">';
              html += '<h3 class="cat-card-name">' + cat.name + '</h3>';
              html += '<p>' + (cat.breed || 'Unknown breed') + '</p>';
              html += '<p>' + (cat.age || '') + ' &middot; ' + (cat.sex || '') + '</p>';
              if (cat.adoptionFee) html += '<p>Fee: ' + cat.adoptionFee + '</p>';
              html += '<button class="save-btn saved" onclick="removeCat(' + i + ')">Remove</button><br>';
              if (cat.sourceUrl) html += '<a href="' + cat.sourceUrl + '" target="_blank">View Listing</a>';
              html += '</div></div>';
            }
            grid.innerHTML = html;
          }

          renderSaved();
        </script>
        </main>
      </div>
    </div>
  </body>
</html>
