<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="home.css">
    <title>CatScout - Settings</title>
  </head>
  <body>
    <div class="page">
      <!-- Header -->
      <header class="header">
        <h1 class="logo">CatScout</h1>
        <p class="tagline">looking for your fur-ever friend? you've come to the right place.</p>
      </header>

      <div class="content-wrapper">
        <!-- Sidebar -->
        <nav class="sidebar">
          <a href="index.html" class="nav-link">Home</a>
          <a href="explore.html" class="nav-link">Explore</a>
          <a href="newowners.html" class="nav-link">New Owners</a>
          <a href="saved.html" class="nav-link">Saved</a>
          <a href="settings.html" class="nav-link active">Settings</a>
          <a href="credits.html" class="nav-link">Credits</a>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
          <h2 class="welcome">Settings</h2>

          <!-- Appearance -->
          <section class="settings-group">
            <h3 class="settings-group-title">Appearance</h3>
            <div class="setting-item">
              <span class="setting-label">Dark Mode</span>
              <label class="toggle" for="darkModeToggle">
                <input type="checkbox" id="darkModeToggle">
                <span class="toggle-slider"></span>
              </label>
            </div>
          </section>

        </main>

        <script>
          const $ = id => document.getElementById(id);
          const save = (k, v) => localStorage.setItem(k, v);

          // Dark Mode
          const darkToggle = $('darkModeToggle');
          darkToggle.checked = localStorage.getItem('darkMode') === 'true';
          document.body.classList.toggle('dark', darkToggle.checked);
          darkToggle.onchange = () => {
            document.body.classList.toggle('dark', darkToggle.checked);
            save('darkMode', darkToggle.checked);
          };
        </script>
      </div>
    </div>
  </body>
</html>
